services:
  dragonflydb:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.0
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonflydata:/data
  nats:
    image: docker.io/library/nats:2.12.7
    ports:
      - "4222:4222"
  orthanc:
    image: docker.io/jodogne/orthanc:1.12.11
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc:/var/lib/orthanc/db
    network_mode: "host"
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:8042/patients"]
      interval: 2s
      timeout: 4s
      retries: 3
      start_period: 30s
  get-data:
    image: ghcr.io/fnndsc/utils:7c65939
    command: /get_data.sh
    volumes:
      - ./get_data.sh:/get_data.sh:ro
    depends_on:
      orthanc:
        condition: service_healthy
    profiles:
      - tools
    network_mode: "host"  # so that Orthanc in a container can send data out

volumes:
  orthanc:
  dragonflydata:
